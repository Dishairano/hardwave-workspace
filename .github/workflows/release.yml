name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd src-tauri
          node -e "
            const fs = require('fs');
            let conf = fs.readFileSync('tauri.conf.json','utf8');
            conf = conf.replace(/\"version\": \"[^\"]*\"/, '\"version\": \"'+'$VERSION'+'\"');
            fs.writeFileSync('tauri.conf.json', conf);
            let cargo = fs.readFileSync('Cargo.toml','utf8');
            cargo = cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"'+'$VERSION'+'\"');
            fs.writeFileSync('Cargo.toml', cargo);
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Hardwave Workspace v__VERSION__'
          releaseBody: |
            Hardwave Workspace desktop app with auto file sync.

            Download the installer for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
